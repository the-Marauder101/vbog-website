<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Vyom — All Tasks</title>
  <link rel="icon" href="img/vyom.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>
  <div id="offline-banner" hidden>You appear to be offline</div>

  <nav class="topnav">
    <div class="brand-wrap"><a class="brand" href="vyom.html"><svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true"><defs><linearGradient id="vgrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00B4D8"/><stop offset="1" stop-color="#7C3AED"/></linearGradient></defs><g transform="rotate(-20 16 16)"><ellipse cx="16" cy="16" rx="15" ry="7.5" fill="none" stroke="url(#vgrad)" stroke-width="1" opacity="0.45"/><path d="M 2.5 16 A 13.5 5.2 0 0 1 29.5 16" fill="none" stroke="url(#vgrad)" stroke-width="2.2" stroke-linecap="round"/></g><circle cx="16" cy="16" r="7.2" fill="#0F3460"/><path d="M 12.2 13.1 a 5.2 5.2 0 0 1 6.4 -0.6" fill="none" stroke="#00B4D8" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/><g transform="rotate(-20 16 16)"><path d="M 2.5 16 A 13.5 5.2 0 0 0 29.5 16" fill="none" stroke="url(#vgrad)" stroke-width="2.2" stroke-linecap="round"/><circle cx="27.1" cy="12.6" r="4" fill="#00B4D8" opacity="0.25"/><circle cx="27.1" cy="12.6" r="2.4" fill="#00B4D8"/></g></svg><span class="brand-text">Vyom<span class="dot">.</span></span></a><span class="brand-by">by VBOG</span></div>
    <div class="nav-links">
      <a href="vyom.html">Dashboard</a>
      <a href="team.html" class="active">All Tasks</a>
    </div>
    <div class="nav-right">
      <a href="settings.html">Settings</a>
    </div>
  </nav>

  <main class="page">
    <div class="page-header">
      <div>
        <h1>All Tasks</h1>
        <div class="sub">Every task across every project — filter by project, assignee, or due date</div>
      </div>
    </div>

    <div class="filter-bar">
      <span class="filter-icon" aria-hidden="true"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg></span>
      <select id="filter-project" class="filter-select" aria-label="Filter by project"></select>
      <select id="filter-assignee" class="filter-select" aria-label="Filter by assignee"></select>
      <select id="filter-due" class="filter-select" aria-label="Filter by due date"></select>
      <span class="range-inputs" id="range-inputs" hidden>
        <input type="date" class="filter-date" id="filter-from" aria-label="From date">
        <span class="range-arrow">&rarr;</span>
        <input type="date" class="filter-date" id="filter-to" aria-label="To date">
      </span>
      <input type="search" id="filter-search" class="filter-search" placeholder="Search task titles…">
      <button id="filter-clear" class="btn-link" hidden>Clear filters</button>
      <span class="filter-count" id="filter-count"></span>
    </div>

    <div id="tasks-content"><div class="loading">Loading tasks…</div></div>
  </main>

  <script src="js/config.js?v=7"></script>
  <script src="js/supabase.js?v=7"></script>
  <script src="js/api.js?v=7"></script>
  <script src="js/ui.js?v=7"></script>
  <script src="js/auth.js?v=7"></script>
  <script src="js/inbox.js?v=7"></script>
  <script src="js/team.js?v=7"></script>
</body>
</html>
