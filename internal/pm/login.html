<!DOCTYPE html>
<!--
  Vyom — VBOG's task management tool.
  DEVELOPERS: read ARCHITECTURE.md (same folder) before changing anything —
  it documents the whole system: files, database schema, conventions,
  known pitfalls, and the roadmap. README.md covers usage & operations.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Vyom — Sign in</title>
  <link rel="icon" href="img/vyom.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=11">
</head>
<body class="login-body">
  <div class="login-card">
    <svg class="login-mark" viewBox="0 0 32 32" aria-hidden="true"><defs><linearGradient id="lgrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00B4D8"/><stop offset="1" stop-color="#7C3AED"/></linearGradient></defs><g transform="rotate(-20 16 16)"><ellipse cx="16" cy="16" rx="15" ry="7.5" fill="none" stroke="url(#lgrad)" stroke-width="1" opacity="0.45"/><path d="M 2.5 16 A 13.5 5.2 0 0 1 29.5 16" fill="none" stroke="url(#lgrad)" stroke-width="2.2" stroke-linecap="round"/></g><circle cx="16" cy="16" r="7.2" fill="#0F3460"/><path d="M 12.2 13.1 a 5.2 5.2 0 0 1 6.4 -0.6" fill="none" stroke="#00B4D8" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/><g transform="rotate(-20 16 16)"><path d="M 2.5 16 A 13.5 5.2 0 0 0 29.5 16" fill="none" stroke="url(#lgrad)" stroke-width="2.2" stroke-linecap="round"/><circle cx="27.1" cy="12.6" r="2.4" fill="#00B4D8"/><circle cx="27.1" cy="12.6" r="4" fill="#00B4D8" opacity="0.25"/></g></svg>
    <h1 class="login-title">Vyom<span class="dot">.</span></h1>
    <div class="login-sub">VBOG's universe of work</div>
    <form id="login-form" novalidate>
      <div class="form-group">
        <input type="text" id="login-code" placeholder="Enter your ID" autocomplete="off" autofocus>
      </div>
      <button type="submit" class="btn btn-primary login-btn">Enter Vyom</button>
    </form>
    <div class="login-hint">Don't have an ID? Ask your admin to create one in Settings.</div>
  </div>

  <script src="js/config.js?v=11"></script>
  <script src="js/supabase.js?v=11"></script>
  <script src="js/ui.js?v=11"></script>
  <script src="js/auth.js?v=11"></script>
  <script>
    // Already logged in? Straight to the dashboard.
    if (Auth.user()) window.location.replace("vyom.html");

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const input = document.getElementById("login-code");
      UI.clearFieldErrors(e.target);
      const code = input.value.trim().toLowerCase();
      if (!code) {
        UI.fieldError(input, "Enter your ID to continue.");
        return;
      }
      try {
        const rows = await sbFetch(
          `team_members?login_code=eq.${encodeURIComponent(code)}&active=eq.true&select=id,name,user_role`
        );
        if (!rows.length) {
          UI.fieldError(input, "That ID doesn't match anyone. Check with your admin.");
          return;
        }
        Auth.save(rows[0]);
        window.location.replace("vyom.html");
      } catch (err) {
        UI.fieldError(input, err.message);
      }
    });
  </script>
</body>
</html>
