<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTT Flow Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f11;--surface:#161a1e;--surface2:#1c2128;--border:#252b32;--muted:#3a4149;
  --text:#dde2e8;--subtext:#7a8694;--orange:#E8622A;--orange-d:#c4511f;
  --green:#27ae60;--blue:#2980b9;--yellow:#e67e22;--red:#c0392b;
  --mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100%;overflow:hidden;font-size:14px;}

/* ── TOOLBAR ── */
.toolbar{
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:8px;position:relative;z-index:50;
}
.tb-brand{display:flex;align-items:center;gap:9px;margin-right:14px;}
.tb-dot{width:8px;height:8px;background:var(--orange);border-radius:50%;}
.tb-title{font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--subtext);text-transform:uppercase;}
.tb-title span{color:var(--orange);}
.tb-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:12px;font-weight:500;font-family:var(--sans);
  padding:7px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  transition:border-color .12s,background .12s;white-space:nowrap;
}
.tb-btn:hover{border-color:var(--muted);}
.tb-btn.primary{background:var(--orange);border-color:var(--orange);color:#fff;}
.tb-btn.primary:hover{background:var(--orange-d);}
.tb-sep{width:1px;height:24px;background:var(--border);margin:0 4px;}
.tb-spacer{flex:1;}
.tb-hint{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.04em;}

/* ── CANVAS ── */
.canvas-wrap{
  position:absolute;top:52px;left:0;right:0;bottom:0;overflow:auto;
  background:
    radial-gradient(circle, #1a1f25 1px, transparent 1px);
  background-size:24px 24px;
  background-color:var(--bg);
}
.canvas{position:relative;width:5200px;height:4200px;}
#edgeLayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

/* ── NODES ── */
.node{
  position:absolute;width:232px;background:var(--surface);
  border:1px solid var(--border);border-radius:9px;cursor:grab;
  user-select:none;box-shadow:0 2px 10px rgba(0,0,0,.35);
  transition:box-shadow .12s;
}
.node:hover{box-shadow:0 4px 16px rgba(0,0,0,.5);}
.node.selected{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,98,42,.35);}
.node.dragging{cursor:grabbing;opacity:.92;z-index:30;}
.node-head{
  padding:8px 11px;border-bottom:1px solid var(--border);border-radius:9px 9px 0 0;
  display:flex;align-items:center;gap:7px;
}
.node-type-tag{
  font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;
  padding:1px 6px;border-radius:3px;font-weight:500;flex-shrink:0;
}
.node-title{font-size:12px;font-weight:600;line-height:1.35;color:var(--text);padding:8px 11px 4px;}
.node-sub{font-size:10px;color:var(--subtext);line-height:1.4;padding:0 11px 7px;}
.node-opts{padding:0 0 7px;}
.node-opt{
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  padding:4px 11px;font-size:11px;color:var(--subtext);position:relative;
}
.node-opt-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.node-opt-port{
  width:9px;height:9px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--muted);background:var(--bg);
}
.node-opt-port.linked{border-color:var(--orange);background:var(--orange);}
.node-opt-port.unlinked{border-color:var(--red);}
/* question node */
.node.q .node-head{background:#13202c;}
.node.q .node-type-tag{background:#0d1f30;color:#5ba8d4;border:1px solid #1a3a54;}
/* outcome variants */
.node.o .node-head{background:#15191d;}
.node.o{width:212px;}
.tag-DESK{background:#0d2b1c;color:#4ecf84;border:1px solid #1f4d33;}
.tag-QUOTE{background:#2a1f0a;color:#d4a030;border:1px solid #4d3a1a;}
.tag-DISPATCH{background:#0d1f30;color:#5ba8d4;border:1px solid #1a3a54;}
.tag-WARRANTY{background:#0d2b1c;color:#4ecf84;border:1px solid #1f4d33;}
.tag-REPLACEMENT{background:#101a30;color:#7a9ae0;border:1px solid #243a64;}
.tag-ESCALATE{background:#2a0d0d;color:#e08080;border:1px solid #4d1a1a;}
.tag-HOLD{background:#141c24;color:#8a9bb0;border:1px solid #2a3240;}
.tag-FLAG{background:#2a1810;color:#e8915a;border:1px solid #4a2815;}
.tag-INFO{background:#141c24;color:#8a9bb0;border:1px solid #2a3240;}
.node-start-badge{
  position:absolute;top:-9px;left:10px;font-family:var(--mono);font-size:9px;
  background:var(--orange);color:#fff;padding:1px 7px;border-radius:3px;
  letter-spacing:.06em;font-weight:500;
}

/* ── EDITOR PANEL ── */
.panel{
  position:absolute;top:52px;right:0;bottom:0;width:340px;
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .2s ease;z-index:60;
  display:flex;flex-direction:column;
}
.panel.open{transform:translateX(0);}
.panel-head{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.panel-title{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);}
.panel-close{background:none;border:none;color:var(--subtext);font-size:18px;cursor:pointer;padding:0 4px;}
.panel-close:hover{color:var(--text);}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px 60px;}
.fld{margin-bottom:13px;}
.fld-label{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--subtext);margin-bottom:5px;display:block;}
.fld input[type=text],.fld textarea,.fld select{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:8px 10px;color:var(--text);font-size:12px;font-family:var(--sans);outline:none;
}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--orange);}
.fld textarea{resize:vertical;min-height:54px;line-height:1.5;}
.fld select{cursor:pointer;}
.opt-editor{
  background:var(--bg);border:1px solid var(--border);border-radius:7px;
  padding:9px;margin-bottom:8px;position:relative;
}
.opt-editor input,.opt-editor select{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;
  padding:6px 8px;color:var(--text);font-size:11px;font-family:var(--sans);outline:none;margin-bottom:6px;
}
.opt-editor input:focus,.opt-editor select:focus{border-color:var(--orange);}
.opt-editor select{margin-bottom:0;cursor:pointer;}
.opt-del{
  position:absolute;top:6px;right:7px;background:none;border:none;color:var(--muted);
  font-size:13px;cursor:pointer;padding:0 3px;
}
.opt-del:hover{color:var(--red);}
.panel-btn{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:12px;padding:8px;cursor:pointer;font-family:var(--sans);
  margin-bottom:8px;transition:border-color .12s;
}
.panel-btn:hover{border-color:var(--muted);}
.panel-btn.danger{color:#e08080;border-color:#4d1a1a;}
.panel-btn.danger:hover{background:#2a0d0d;}
.panel-btn.accent{background:var(--orange);border-color:var(--orange);color:#fff;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);margin-bottom:6px;cursor:pointer;}
.checkbox-row input{accent-color:var(--orange);}

/* ── RUN MODAL ── */
.run-overlay{
  position:fixed;inset:0;background:rgba(8,10,12,.86);z-index:200;
  display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:36px 16px;
}
.run-overlay.open{display:flex;}
.run-card{
  width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;animation:popIn .18s ease;
}
@keyframes popIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.run-head{
  padding:13px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;background:var(--surface2);
}
.run-head-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);}
.run-body{padding:20px 18px;}
.run-q{font-size:17px;font-weight:600;line-height:1.35;margin-bottom:6px;}
.run-sub{font-size:12.5px;color:var(--subtext);line-height:1.55;margin-bottom:16px;}
.run-choice{
  display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;
  font-family:var(--sans);transition:border-color .12s,background .12s;
}
.run-choice:hover{border-color:var(--orange);background:var(--surface2);}
.run-choice-label{font-size:13.5px;font-weight:500;color:var(--text);display:block;}
.run-choice-desc{font-size:11.5px;color:var(--subtext);margin-top:2px;display:block;line-height:1.45;}
.run-outcome-head{padding:16px 18px;display:flex;align-items:center;gap:12px;}
.run-outcome-icon{font-size:26px;}
.run-outcome-type{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.8;display:block;}
.run-outcome-title{font-size:16px;font-weight:600;display:block;margin-top:1px;}
.run-outcome-body{padding:14px 18px;font-size:13px;line-height:1.6;background:rgba(0,0,0,.25);}
.oc-DESK .run-outcome-head{background:#0d2b1c;color:#4ecf84;}
.oc-QUOTE .run-outcome-head{background:#2a1f0a;color:#d4a030;}
.oc-DISPATCH .run-outcome-head{background:#0d1f30;color:#5ba8d4;}
.oc-WARRANTY .run-outcome-head{background:#0d2b1c;color:#4ecf84;}
.oc-REPLACEMENT .run-outcome-head{background:#101a30;color:#7a9ae0;}
.oc-ESCALATE .run-outcome-head{background:#2a0d0d;color:#e08080;}
.oc-HOLD .run-outcome-head{background:#141c24;color:#8a9bb0;}
.oc-FLAG .run-outcome-head{background:#2a1810;color:#e8915a;}
.oc-INFO .run-outcome-head{background:#141c24;color:#8a9bb0;}
.run-checklist{
  margin:14px 18px;border:1px solid #4a2815;border-radius:8px;overflow:hidden;
}
.run-checklist-head{
  background:#2a1810;padding:10px 14px;font-size:13px;font-weight:600;color:var(--orange);
}
.run-checklist-items{padding:10px 14px;background:var(--bg);}
.run-checklist-item{
  display:flex;gap:9px;font-size:12.5px;color:var(--text);line-height:1.5;margin-bottom:7px;
}
.run-checklist-item::before{content:'☐';color:var(--orange);flex-shrink:0;}
.run-msg{
  margin:0 18px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;
}
.run-msg-head{
  padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.run-msg-label{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--subtext);}
.run-msg-copy{background:none;border:1px solid var(--border);border-radius:5px;color:var(--subtext);font-size:10px;padding:3px 9px;cursor:pointer;font-family:var(--sans);}
.run-msg-copy:hover{color:var(--text);border-color:var(--muted);}
.run-msg-body{padding:11px 12px;font-size:12px;line-height:1.65;white-space:pre-wrap;color:var(--text);max-height:220px;overflow-y:auto;}
.run-foot{
  padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface2);
}
.run-btn{
  flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:12px;padding:9px;cursor:pointer;font-family:var(--sans);
}
.run-btn:hover{border-color:var(--muted);}
.run-btn.accent{background:var(--orange);border-color:var(--orange);color:#fff;}
.run-path{
  font-family:var(--mono);font-size:9px;color:var(--muted);padding:8px 18px 0;letter-spacing:.03em;
  line-height:1.6;word-break:break-word;
}

/* ── LEGEND ── */
.legend{
  position:absolute;bottom:14px;left:14px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;padding:10px 13px;z-index:40;
  display:flex;gap:11px;flex-wrap:wrap;max-width:560px;
}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--subtext);}
.legend-dot{width:8px;height:8px;border-radius:2px;}

/* toast */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-size:12px;padding:9px 18px;border-radius:8px;z-index:300;transition:transform .25s ease;
}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tb-brand">
    <div class="tb-dot"></div>
    <div class="tb-title"><span>CTT</span> Flow Editor</div>
  </div>
  <button class="tb-btn primary" onclick="startRun()">▶ Test Flow</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="addNode('q')">+ Question</button>
  <button class="tb-btn" onclick="addNode('o')">+ Outcome</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="autoLayout();renderAll();toast('Auto-arranged')">⊞ Auto-arrange</button>
  <button class="tb-btn" onclick="exportJSON()">⬇ Export</button>
  <button class="tb-btn" onclick="document.getElementById('importFile').click()">⬆ Import</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  <button class="tb-btn" onclick="resetToSeed()">↺ Reset to Default</button>
  <div class="tb-spacer"></div>
  <span class="tb-hint">DRAG node to move · CLICK node to edit · Red port = unlinked option</span>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <div class="canvas" id="canvas">
    <svg id="edgeLayer"></svg>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#5ba8d4"></span>Question</div>
    <div class="legend-item"><span class="legend-dot" style="background:#4ecf84"></span>Desk / Warranty</div>
    <div class="legend-item"><span class="legend-dot" style="background:#d4a030"></span>Non-warranty</div>
    <div class="legend-item"><span class="legend-dot" style="background:#7a9ae0"></span>Replacement</div>
    <div class="legend-item"><span class="legend-dot" style="background:#e08080"></span>Escalate</div>
    <div class="legend-item"><span class="legend-dot" style="background:#e8915a"></span>Flag</div>
    <div class="legend-item"><span class="legend-dot" style="background:#8a9bb0"></span>Hold / Info</div>
  </div>
</div>

<!-- EDITOR PANEL -->
<div class="panel" id="panel">
  <div class="panel-head">
    <span class="panel-title" id="panelTitle">Edit Node</span>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<!-- RUN MODAL -->
<div class="run-overlay" id="runOverlay">
  <div class="run-card" id="runCard"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════
// SEED GRAPH — the complete intake decision tree.
// Edit freely in the UI. Reset restores this.
// Node: {id, kind:'q'|'o', title, sub, opts:[{label,desc,target}],
//        For outcomes: otype, summary, checklist:'dispatch'|'aed160'|null, msg, msgch}
// ════════════════════════════════════════════════════════════════
function seedGraph(){
return {
start:'n_contact',
nodes:{

// ── STAGE 1: CONTACT & ORIGIN ─────────────────────────────────
n_contact:{kind:'q',title:'How did the complaint come in?',sub:'Determines the response protocol.',opts:[
 {label:'📞 Phone',desc:'Live call — triage immediately',target:'n_origin_pw'},
 {label:'💬 WhatsApp',desc:'Live chat — triage like a call',target:'n_origin_pw'},
 {label:'✉️ Email',desc:'Written — checklist-first protocol',target:'n_origin_e'},
]},

n_origin_pw:{kind:'q',title:'Where did the heater come from?',sub:'Ask the customer directly.',opts:[
 {label:'Bought it myself / retail store',desc:'Retail channel',target:'n_capacity'},
 {label:'Installed by developer / contractor / Sadara',desc:'Project channel',target:'n_tech'},
 {label:'Came with the apartment / moved in',desc:'Need to establish FM involvement',target:'n_fm_pw'},
]},
n_fm_pw:{kind:'q',title:'Is there an FM company or building maintenance?',sub:'For pre-installed units.',opts:[
 {label:'Yes — FM / maintenance manages property',desc:'Treat as Project',target:'n_tech'},
 {label:'No — owner-managed',desc:'Treat as Retail',target:'n_capacity'},
]},

n_origin_e:{kind:'q',title:'(Email) Where did the heater come from?',sub:'Check the email content or reply to ask.',opts:[
 {label:'Retail purchase',desc:'',target:'o_email_retail'},
 {label:'Developer / contractor / Sadara',desc:'',target:'o_email_project'},
 {label:'Moved in / unclear',desc:'Check FM involvement',target:'n_fm_e'},
]},
n_fm_e:{kind:'q',title:'(Email) FM company involved?',sub:'',opts:[
 {label:'Yes — FM involved',desc:'',target:'o_email_project'},
 {label:'No / unclear',desc:'',target:'o_email_retail'},
]},

o_email_retail:{kind:'o',otype:'INFO',title:'Send retail email + checklist',
 summary:'No questionnaire needed. Send the retail response email with the checklist attached. Await completed checklist, photos, serial number, and proof of purchase before any scheduling.',
 checklist:null,msgch:'email',
 msg:'Dear [Customer Name],\n\nThank you for reaching out to Cheqpoint After-Sales regarding your Atlantic water heater.\n\nTo allow us to proceed, please provide:\n\n1. Proof of purchase or warranty certificate.\n2. Photos/video of the fault and the rating plate (model + serial number).\n3. Your address and a convenient visit time if needed.\n\nIf an on-site visit is required and the fault is outside product warranty scope, a call-out fee of AED 160 (VAT inclusive) applies.\n\nPlease complete and return the attached Warranty Claim Checklist.\n\nKind regards,\nMetalyn Juntura\nCheqpoint After-Sales'},

o_email_project:{kind:'o',otype:'INFO',title:'Send Sadara acknowledgement + checklist email',
 summary:'Two emails: (1) acknowledgement to Sadara, (2) checklist requirements to the contractor/client. No dispatch until completed checklist, photos, and warranty certificate are received. Incomplete submissions close after 48 hours.',
 checklist:null,msgch:'email',
 msg:'EMAIL 1 — TO SADARA:\n\nDear [Sadara Contact],\n\nWe hereby acknowledge the complaint regarding [fault] at [site/unit]. Our technical team will review and coordinate directly with the client for documents, assessment, and action.\n\nBest regards,\nMetalyn Juntura\nAtlantic AfterSales\n\n────────────────\n\nEMAIL 2 — TO CONTRACTOR:\n\nDear [Contact Name],\n\nAll contractor-managed complaints are processed only after receipt of a fully completed "Warranty Claim Request – Checklist and Declaration" form.\n\nRequired: warranty certificate; photos/video of fault + serial label; site location pin + access instructions; site contact name and mobile.\n\nIf the issue is out of warranty, installation-related, or misuse, the visit is chargeable at AED 160 (VAT inc). Incomplete submissions are closed after 48 hours.\n\nKind regards,\nMetalyn Juntura\nAtlantic AfterSales'},

// ── STAGE 2: PROJECT TECH WALK-THROUGH ────────────────────────
n_tech:{kind:'q',title:'Does the customer have a technician / FM available right now?',sub:'If yes, get them on the call — we may avoid a dispatch.',opts:[
 {label:'Yes — technician available',desc:'Bring them onto the call',target:'n_tc1'},
 {label:'No — no technical help right now',desc:'Proceed with standard questions',target:'n_capacity'},
]},
n_tc1:{kind:'q',title:'TECH CHECK 1 — Is the power indicator light ON?',sub:'Say: "Please look at the front of the unit — is the light on?"',opts:[
 {label:'Yes — light is ON',desc:'Power reaching unit',target:'n_tc2'},
 {label:'No — no light',desc:'DB or supply issue',target:'o_flag_db'},
]},
n_tc2:{kind:'q',title:'TECH CHECK 2 — Thermostat dial setting?',sub:'Say: "What number is the dial set to? 1 is lowest, 5 is highest."',opts:[
 {label:'Below 4 (position 1–3)',desc:'Setting too low',target:'o_desk_thermo_tech'},
 {label:'Set at 4 or 5 — correct',desc:'',target:'n_tc3'},
 {label:'Cannot access / unknown',desc:'Skip',target:'n_tc3'},
]},
n_tc3:{kind:'q',title:'TECH CHECK 3 — How many pipes connected to the unit?',sub:'Say: "Count the pipes going in and out of the heater."',opts:[
 {label:'Two pipes only',desc:'No recirculation — plumbing scope',target:'o_flag_plumbing'},
 {label:'Three or more — recirculation present',desc:'',target:'n_tc4'},
 {label:'Cannot confirm',desc:'Skip',target:'n_tc4'},
]},
n_tc4:{kind:'q',title:'TECH CHECK 4 — Electrical connections tight and secure?',sub:'Say: "Please check the terminal screws are tight."',opts:[
 {label:'Found loose connection — re-secured',desc:'Possible desk resolution',target:'o_desk_elec'},
 {label:'All tight and secure',desc:'',target:'n_tc5'},
 {label:'Cannot check',desc:'Skip',target:'n_tc5'},
]},
n_tc5:{kind:'q',title:'TECH CHECK 5 — Any visible leaks or water staining?',sub:'Say: "Look around the unit and pipework for water marks."',opts:[
 {label:'Yes — leak or staining visible',desc:'Leakage fault — note location',target:'o_dispatch_leak'},
 {label:'No — all dry',desc:'',target:'o_dispatch_assess'},
]},

o_flag_db:{kind:'o',otype:'FLAG',title:'Flag — DB / power supply issue',
 summary:'No power at the unit. Likely a DB trip or supply issue — not a product fault. Ask the technician to check the distribution board and incoming supply. If DB is fine and still no power, dispatch may be required.',
 checklist:'dispatch',msgch:'whatsapp',

// STATE
// ════════════════════════════════════════════════════════════════
let G = null;            // {start, nodes}
let selectedId = null;
let runStack = [];

const LS_KEY = 'ctt_flow_v1';

function loadGraph(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ G = JSON.parse(raw); return; }
  }catch(e){}
  G = seedGraph();
  autoLayout();
}
function saveGraph(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(G)); }catch(e){}
}

// ════════════════════════════════════════════════════════════════
// AUTO LAYOUT — BFS depth columns
// ════════════════════════════════════════════════════════════════
function autoLayout(){
  const depths = {};
  const visited = new Set();
  const queue = [[G.start,0]];
  while(queue.length){
    const [id,d] = queue.shift();
    if(!G.nodes[id]) continue;
    if(visited.has(id)){
      if(d > depths[id]) depths[id] = d; // push deeper if reachable later
      continue;
    }
    visited.add(id); depths[id]=d;
    (G.nodes[id].opts||[]).forEach(o=>{
      if(o.target && G.nodes[o.target]) queue.push([o.target,d+1]);
    });
  }
  // unreachable nodes go to last column
  let maxD = 0; Object.values(depths).forEach(d=>{if(d>maxD)maxD=d;});
  Object.keys(G.nodes).forEach(id=>{ if(!(id in depths)) depths[id]=maxD+1; });

  // group by depth, stack vertically
  const cols = {};
  Object.keys(G.nodes).forEach(id=>{
    const d = depths[id];
    if(!cols[d]) cols[d]=[];
    cols[d].push(id);
  });
  const COLW = 310;
  Object.keys(cols).sort((a,b)=>a-b).forEach(d=>{
    let y = 50;
    cols[d].forEach(id=>{
      const n = G.nodes[id];
      n.x = 50 + d*COLW;
      n.y = y;
      const optCount = (n.opts||[]).length;
      const estH = (n.kind==='q') ? (78 + optCount*24) : 96;
      y += estH + 26;
    });
  });
}

// ════════════════════════════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const edgeLayer = document.getElementById('edgeLayer');

const OTYPE_META = {
  DESK:{icon:'📋',label:'Desk Resolution'},
  QUOTE:{icon:'🧾',label:'Non-Warranty'},
  DISPATCH:{icon:'🚚',label:'Dispatch'},
  WARRANTY:{icon:'✅',label:'Warranty Repair'},
  REPLACEMENT:{icon:'📦',label:'Replacement Auth'},
  ESCALATE:{icon:'🚨',label:'Escalate to MD'},
  HOLD:{icon:'⏸️',label:'On Hold'},
  FLAG:{icon:'⚠️',label:'Flag'},
  INFO:{icon:'✉️',label:'Email Action'},
};

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderAll(){
  // remove old node divs
  canvas.querySelectorAll('.node').forEach(el=>el.remove());
  Object.keys(G.nodes).forEach(id=>renderNode(id));
  requestAnimationFrame(drawEdges);
  saveGraph();
}

function renderNode(id){
  const n = G.nodes[id];
  const el = document.createElement('div');
  el.className = 'node '+n.kind+(id===selectedId?' selected':'');
  el.style.left = (n.x||50)+'px';
  el.style.top  = (n.y||50)+'px';
  el.dataset.id = id;

  let head, body='';
  if(n.kind==='q'){
    head = `<div class="node-head"><span class="node-type-tag tag-DISPATCH" style="background:#0d1f30;color:#5ba8d4;border-color:#1a3a54;">Question</span></div>`;
    body = `<div class="node-title">${esc(n.title)}</div>`
         + (n.sub?`<div class="node-sub">${esc(n.sub)}</div>`:'')
         + `<div class="node-opts">`
         + (n.opts||[]).map((o,i)=>{
             const linked = o.target && G.nodes[o.target];
             return `<div class="node-opt" data-opt="${i}">
               <span class="node-opt-label">${esc(o.label)}</span>
               <span class="node-opt-port ${linked?'linked':'unlinked'}"></span>
             </div>`;
           }).join('')
         + `</div>`;
  } else {
    const m = OTYPE_META[n.otype]||OTYPE_META.INFO;
    head = `<div class="node-head"><span class="node-type-tag tag-${n.otype}">${m.icon} ${m.label}</span></div>`;
    body = `<div class="node-title">${esc(n.title)}</div>`
         + `<div class="node-sub">${esc((n.summary||'').slice(0,90))}${(n.summary||'').length>90?'…':''}</div>`;
  }
  el.innerHTML = head + body + (id===G.start?'<span class="node-start-badge">START</span>':'');
  canvas.appendChild(el);

  // drag + click
  let dragMoved=false, sx=0, sy=0, ox=0, oy=0;
  el.addEventListener('pointerdown', e=>{
    if(e.button!==0) return;
    dragMoved=false; sx=e.clientX; sy=e.clientY; ox=n.x; oy=n.y;
    el.setPointerCapture(e.pointerId);
    el.classList.add('dragging');
    const move = ev=>{
      const dx=ev.clientX-sx, dy=ev.clientY-sy;
      if(Math.abs(dx)>3||Math.abs(dy)>3) dragMoved=true;
      n.x = Math.max(0, ox+dx); n.y = Math.max(0, oy+dy);
      el.style.left=n.x+'px'; el.style.top=n.y+'px';
      drawEdges();
    };
    const up = ()=>{
      el.classList.remove('dragging');
      el.removeEventListener('pointermove',move);
      el.removeEventListener('pointerup',up);
      saveGraph();
      if(!dragMoved){ openPanel(id); }
    };
    el.addEventListener('pointermove',move);
    el.addEventListener('pointerup',up);
  });
}

function drawEdges(){
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  let svg = `<defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#E8622A"/>
    </marker>
    <marker id="arrDim" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#4a5560"/>
    </marker>
  </defs>`;
  Object.keys(G.nodes).forEach(id=>{
    const n = G.nodes[id];
    if(n.kind!=='q') return;
    const srcEl = canvas.querySelector(`.node[data-id="${id}"]`);
    if(!srcEl) return;
    (n.opts||[]).forEach((o,i)=>{
      if(!o.target || !G.nodes[o.target]) return;
      const tgtEl = canvas.querySelector(`.node[data-id="${o.target}"]`);
      if(!tgtEl) return;
      const optEl = srcEl.querySelector(`.node-opt[data-opt="${i}"]`);
      let x1, y1;
      if(optEl){
        x1 = srcEl.offsetLeft + srcEl.offsetWidth - 13;
        y1 = srcEl.offsetTop + optEl.offsetTop + optEl.offsetHeight/2;
      } else {
        x1 = srcEl.offsetLeft + srcEl.offsetWidth;
        y1 = srcEl.offsetTop + srcEl.offsetHeight/2;
      }
      const x2 = tgtEl.offsetLeft - 4;
      const y2 = tgtEl.offsetTop + 20;
      const dx = Math.max(45, Math.abs(x2-x1)*0.45);
      const sel = (id===selectedId || o.target===selectedId);
      svg += `<path d="M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}"
        fill="none" stroke="${sel?'#E8622A':'#39424c'}" stroke-width="${sel?2:1.4}"
        marker-end="url(#${sel?'arr':'arrDim'})" opacity="${sel?1:0.85}"/>`;
    });
  });
  edgeLayer.innerHTML = svg;
  edgeLayer.setAttribute('width',W);
  edgeLayer.setAttribute('height',H);
}

// EDITOR PANEL
// ════════════════════════════════════════════════════════════════
function openPanel(id){
  selectedId = id;
  const n = G.nodes[id];
  const panel = document.getElementById('panel');
  const body  = document.getElementById('panelBody');
  document.getElementById('panelTitle').textContent = (n.kind==='q'?'Question Node':'Outcome Node')+' — '+id;

  let html = `
    <div class="fld"><label class="fld-label">Title</label>
      <textarea id="e_title" rows="2">${esc(n.title)}</textarea></div>
    <div class="fld"><label class="fld-label">${n.kind==='q'?'Hint / what to say':'Internal note'}</label>
      <textarea id="e_sub" rows="2">${esc(n.sub||'')}</textarea></div>
  `;

  if(n.kind==='o'){
    html += `
      <div class="fld"><label class="fld-label">Outcome type</label>
        <select id="e_otype">
          ${Object.keys(OTYPE_META).map(t=>`<option value="${t}" ${n.otype===t?'selected':''}>${OTYPE_META[t].icon} ${OTYPE_META[t].label}</option>`).join('')}
        </select></div>
      <div class="fld"><label class="fld-label">Summary (shown on outcome card)</label>
        <textarea id="e_summary" rows="4">${esc(n.summary||'')}</textarea></div>
      <div class="fld"><label class="fld-label">Final checklist card</label>
        <select id="e_checklist">
          <option value="" ${!n.checklist?'selected':''}>None (e.g. desk resolution)</option>
          <option value="dispatch" ${n.checklist==='dispatch'?'selected':''}>Dispatch — checklist must be received</option>
          <option value="aed160" ${n.checklist==='aed160'?'selected':''}>AED 160 — confirm before proceeding</option>
        </select></div>
      <div class="fld"><label class="fld-label">Customer message channel</label>
        <select id="e_msgch">
          <option value="" ${!n.msgch?'selected':''}>No message</option>
          <option value="whatsapp" ${n.msgch==='whatsapp'?'selected':''}>💬 WhatsApp</option>
          <option value="email" ${n.msgch==='email'?'selected':''}>✉️ Email</option>
        </select></div>
      <div class="fld"><label class="fld-label">Customer message template</label>
        <textarea id="e_msg" rows="7">${esc(n.msg||'')}</textarea></div>
    `;
  } else {
    // options editor
    const allNodes = Object.keys(G.nodes).map(nid=>({id:nid,t:G.nodes[nid].title}));
    html += `<label class="fld-label" style="margin-top:4px;">Answer options → arrows</label>`;
    (n.opts||[]).forEach((o,i)=>{
      html += `
        <div class="opt-editor">
          <button class="opt-del" onclick="delOption(${i})" title="Delete option">✕</button>
          <input type="text" placeholder="Option label" value="${esc(o.label)}" oninput="updOption(${i},'label',this.value)">
          <input type="text" placeholder="Small description (optional)" value="${esc(o.desc||'')}" oninput="updOption(${i},'desc',this.value)">
          <select onchange="updOption(${i},'target',this.value)">
            <option value="">— not linked (red port) —</option>
            ${allNodes.map(an=>`<option value="${an.id}" ${o.target===an.id?'selected':''}>${esc(an.t.slice(0,52))}</option>`).join('')}
          </select>
        </div>
      `;
    });
    html += `<button class="panel-btn" onclick="addOption()">+ Add option</button>`;
  }

  html += `
    <div style="height:10px"></div>
    <button class="panel-btn" onclick="setAsStart()">⚑ Set as start node</button>
    <button class="panel-btn accent" onclick="applyNodeEdits()">✓ Apply changes</button>
    <button class="panel-btn danger" onclick="deleteNode()">🗑 Delete node</button>
  `;
  body.innerHTML = html;
  panel.classList.add('open');
  renderAll();
}

function closePanel(){
  selectedId = null;
  document.getElementById('panel').classList.remove('open');
  renderAll();
}

function applyNodeEdits(){
  if(!selectedId) return;
  const n = G.nodes[selectedId];
  n.title = document.getElementById('e_title').value;
  n.sub   = document.getElementById('e_sub').value;
  if(n.kind==='o'){
    n.otype = document.getElementById('e_otype').value;
    n.summary = document.getElementById('e_summary').value;
    n.checklist = document.getElementById('e_checklist').value || null;
    n.msgch = document.getElementById('e_msgch').value || null;
    n.msg   = document.getElementById('e_msg').value || null;
  }
  renderAll();
  toast('Saved');
}

function updOption(i, field, val){
  if(!selectedId) return;
  G.nodes[selectedId].opts[i][field] = val;
  if(field==='target'){ renderAll(); }
  saveGraph();
}
function addOption(){
  if(!selectedId) return;
  G.nodes[selectedId].opts.push({label:'New option',desc:'',target:''});
  openPanel(selectedId);
}
function delOption(i){
  if(!selectedId) return;
  G.nodes[selectedId].opts.splice(i,1);
  openPanel(selectedId);
}
function setAsStart(){
  if(!selectedId) return;
  G.start = selectedId;
  renderAll();
  toast('Start node set');
}
function deleteNode(){
  if(!selectedId) return;
  if(!confirm('Delete this node? Arrows pointing to it will become unlinked (red).')) return;
  const id = selectedId;
  delete G.nodes[id];
  // unlink references
  Object.values(G.nodes).forEach(n=>{
    (n.opts||[]).forEach(o=>{ if(o.target===id) o.target=''; });
  });
  if(G.start===id) G.start = Object.keys(G.nodes)[0]||null;
  closePanel();
  renderAll();
  toast('Node deleted');
}

let nodeCounter = 1;
function addNode(kind){
  let id;
  do { id = (kind==='q'?'n_new_':'o_new_')+nodeCounter++; } while(G.nodes[id]);
  const wrap = document.getElementById('canvasWrap');
  const x = wrap.scrollLeft + 120, y = wrap.scrollTop + 110;
  if(kind==='q'){
    G.nodes[id] = {kind:'q',title:'New question',sub:'',x,y,opts:[{label:'Option 1',desc:'',target:''},{label:'Option 2',desc:'',target:''}]};
  } else {
    G.nodes[id] = {kind:'o',otype:'DESK',title:'New outcome',sub:'',summary:'Describe the resolution steps here.',checklist:null,msgch:null,msg:null,x,y,opts:[]};
  }
  renderAll();
  openPanel(id);
}

// ════════════════════════════════════════════════════════════════
// TEST / RUN MODE
// ════════════════════════════════════════════════════════════════
function startRun(){
  runStack = [G.start];
  renderRun();
  document.getElementById('runOverlay').classList.add('open');
}
function closeRun(){
  document.getElementById('runOverlay').classList.remove('open');
}
function runGo(target){
  runStack.push(target);
  renderRun();
}
function runBack(){
  if(runStack.length>1){ runStack.pop(); renderRun(); }
}
function renderRun(){
  const id = runStack[runStack.length-1];
  const n = G.nodes[id];
  const card = document.getElementById('runCard');
  if(!n){
    card.innerHTML = `<div class="run-body"><div class="run-q" style="color:#e08080;">Broken link</div>
      <div class="run-sub">This arrow points to a node that doesn't exist. Fix it in the editor (red port).</div></div>
      <div class="run-foot">
        <button class="run-btn" onclick="runBack()">← Back</button>
        <button class="run-btn" onclick="closeRun()">Close</button>
      </div>`;
    return;
  }
  const pathStr = runStack.map(s=>G.nodes[s]?G.nodes[s].title.slice(0,26):s).join('  →  ');

  if(n.kind==='q'){
    card.innerHTML = `
      <div class="run-head">
        <span class="run-head-label">Test Flow — Step ${runStack.length}</span>
        <button class="panel-close" onclick="closeRun()">✕</button>
      </div>
      <div class="run-path">${esc(pathStr)}</div>
      <div class="run-body">
        <div class="run-q">${esc(n.title)}</div>
        ${n.sub?`<div class="run-sub">${esc(n.sub)}</div>`:''}
        ${(n.opts||[]).map(o=>`
          <button class="run-choice" ${o.target&&G.nodes[o.target]?`onclick="runGo('${o.target}')"`:`onclick="toast('This option is not linked — fix in editor')" style="opacity:.55;border-style:dashed;"`}>
            <span class="run-choice-label">${esc(o.label)} ${!(o.target&&G.nodes[o.target])?' ⚠ unlinked':''}</span>
            ${o.desc?`<span class="run-choice-desc">${esc(o.desc)}</span>`:''}
          </button>`).join('')}
      </div>
      <div class="run-foot">
        ${runStack.length>1?'<button class="run-btn" onclick="runBack()">← Back</button>':''}
        <button class="run-btn" onclick="runStack=[G.start];renderRun();">↺ Restart</button>
        <button class="run-btn" onclick="closeRun()">Close</button>
      </div>
    `;
  } else {
    const m = OTYPE_META[n.otype]||OTYPE_META.INFO;
    let checklistHTML='';
    if(n.checklist==='dispatch'){
      checklistHTML = `<div class="run-checklist">
        <div class="run-checklist-head">📋 Before dispatch — checklist must be received</div>
        <div class="run-checklist-items">
          <div class="run-checklist-item">Completed Warranty Claim Checklist & Declaration received and signed</div>
          <div class="run-checklist-item">Photos / video of the fault received</div>
          <div class="run-checklist-item">Serial number and model label confirmed</div>
          <div class="run-checklist-item">Proof of purchase / warranty certificate confirmed</div>
          <div class="run-checklist-item">Site access, contact, and visit time confirmed</div>
        </div></div>`;
    } else if(n.checklist==='aed160'){
      checklistHTML = `<div class="run-checklist">
        <div class="run-checklist-head">🧾 Before proceeding — AED 160 confirmed + checklist sent</div>
        <div class="run-checklist-items">
          <div class="run-checklist-item">AED 160 call-out confirmed with the customer</div>
          <div class="run-checklist-item">Customer understands AED 160 is deducted if repair approved</div>
          <div class="run-checklist-item">Checklist sent — awaiting return before scheduling</div>
          <div class="run-checklist-item">Photos of fault and serial number requested</div>
        </div></div>`;
    }
    let msgHTML='';
    if(n.msg){
      msgHTML = `<div class="run-msg">
        <div class="run-msg-head">
          <span class="run-msg-label">${n.msgch==='email'?'✉️ Email template':'💬 WhatsApp template'}</span>
          <button class="run-msg-copy" onclick="copyRunMsg(this)">Copy</button>
        </div>
        <div class="run-msg-body">${esc(n.msg)}</div>
      </div>`;
    }
    card.innerHTML = `
      <div class="run-head">
        <span class="run-head-label">Test Flow — Outcome</span>
        <button class="panel-close" onclick="closeRun()">✕</button>
      </div>
      <div class="run-path">${esc(pathStr)}</div>
      <div class="oc-${n.otype}">
        <div class="run-outcome-head">
          <span class="run-outcome-icon">${m.icon}</span>
          <div>
            <span class="run-outcome-type">${m.label}</span>
            <span class="run-outcome-title">${esc(n.title)}</span>
          </div>
        </div>
        <div class="run-outcome-body">${esc(n.summary||'')}</div>
      </div>
      ${checklistHTML}
      ${msgHTML}
      <div class="run-foot">
        <button class="run-btn" onclick="runBack()">← Back</button>
        <button class="run-btn accent" onclick="runStack=[G.start];renderRun();">↺ New Ticket</button>
        <button class="run-btn" onclick="closeRun()">Close</button>
      </div>
    `;
  }
}
function copyRunMsg(btn){
  const body = btn.closest('.run-msg').querySelector('.run-msg-body').textContent;
  navigator.clipboard.writeText(body).then(()=>{
    btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',1800);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=body;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',1800);
  });
}

// IMPORT / EXPORT / RESET
// ════════════════════════════════════════════════════════════════
function exportJSON(){
  const blob = new Blob([JSON.stringify(G,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ctt_flow_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  toast('Exported');
}
function importJSON(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.nodes || !data.start) throw new Error('bad format');
      G = data;
      renderAll();
      toast('Imported');
    }catch(err){ toast('Import failed — invalid file'); }
  };
  reader.readAsText(file);
  ev.target.value='';
}
function resetToSeed(){
  if(!confirm('Reset the entire flow to the default intake tree? Your edits will be lost (export first if needed).')) return;
  G = seedGraph();
  autoLayout();
  selectedId = null;
  closePanel();
  renderAll();
  toast('Reset to default');
}

// ── TOAST ──
let toastTimer=null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── CLICK EMPTY CANVAS TO DESELECT ──
document.getElementById('canvasWrap').addEventListener('pointerdown', e=>{
  if(e.target.id==='canvas' || e.target.id==='canvasWrap' || e.target.id==='edgeLayer'){
    closePanel();
  }
});

// keyboard: Esc closes panel/run
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ closeRun(); closePanel(); }
});

// ── INIT ──
loadGraph();
renderAll();
window.addEventListener('resize', drawEdges);
</script>
</body>
</html>
