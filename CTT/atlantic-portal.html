<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Internal Portal | Atlantic After-Sales UAE</title>
<style>
  :root {
    --red: #e2001a;
    --navy: #0d2c54;
    --navy-2: #143c72;
    --text: #1f2937;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* ===== Hero / main menu ===== */
  #hero {
    min-height: 100vh;
    background: linear-gradient(160deg, var(--navy) 0%, var(--navy-2) 55%, #1a4a8a 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
  }
  #hero .inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 20px;
  }
  .logo-badge {
    background: var(--red);
    color: #fff;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 10px;
    margin-bottom: 22px;
  }
  #hero h1 { font-size: 30px; font-weight: 700; letter-spacing: -.01em; }
  #hero .sub { margin-top: 10px; font-size: 15px; opacity: .8; max-width: 480px; line-height: 1.6; }
  .cards {
    display: grid;
    grid-template-columns: repeat(2, minmax(240px, 320px));
    gap: 22px;
    margin-top: 44px;
    width: 100%;
    max-width: 720px;
    justify-content: center;
  }
  .tool-card {
    background: #fff;
    color: var(--text);
    border-radius: 18px;
    padding: 30px 26px;
    text-align: left;
    border: none;
    font: inherit;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
    transition: transform .14s, box-shadow .14s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tool-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.32); }
  .tool-card .icon {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin-bottom: 6px;
  }
  .tool-card.guide .icon { background: #e8f0fc; }
  .tool-card.calc .icon { background: #fdeaec; }
  .tool-card h2 { font-size: 19px; color: var(--navy); }
  .tool-card p { font-size: 14px; color: var(--muted); line-height: 1.55; }
  .tool-card .go { margin-top: auto; padding-top: 10px; font-size: 13.5px; font-weight: 700; color: var(--red); }
  #hero footer { text-align: center; font-size: 12px; opacity: .55; padding: 18px; }
  @media (max-width: 620px) {
    .cards { grid-template-columns: 1fr; max-width: 360px; }
    #hero h1 { font-size: 24px; }
    #hero .inner { padding: 36px 18px; }
  }

  /* ===== Tool frame ===== */
  #toolWrap { position: fixed; inset: 0; background: #fff; }
  #toolWrap[hidden] { display: none; }
  #toolFrame { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>

<div id="hero">
  <div class="inner">
    <div class="logo-badge">ATLANTIC</div>
    <h1>After-Sales Internal Portal</h1>
    <p class="sub">Official After-Sales | Water Heaters &amp; Heat Pumps, UAE.<br>Pick a tool to get started.</p>
    <div class="cards">
      <button type="button" class="tool-card guide" onclick="openTool('guide')">
        <span class="icon">&#128203;</span>
        <h2>Front Desk Guide</h2>
        <p>Click-and-follow SOP cards for every customer situation, with prices to quote and ready-to-send messages with one-click copy.</p>
        <span class="go">Open guide &rarr;</span>
      </button>
      <button type="button" class="tool-card calc" onclick="openTool('calc')">
        <span class="icon">&#129518;</span>
        <h2>Quote Calculator</h2>
        <p>Build an instant estimate for installations, repairs and spare parts, then print a formal quotation as a PDF.</p>
        <span class="go">Open calculator &rarr;</span>
      </button>
    </div>
  </div>
  <footer>Internal use only &middot; Atlantic After-Sales UAE</footer>
</div>

<div id="toolWrap" hidden>
  <iframe id="toolFrame" title="Tool"></iframe>
</div>

<!-- ============ EMBEDDED TOOL: FRONT DESK GUIDE ============ -->
<template id="tpl-guide">
<style>
  :root {
    --red: #e2001a;
    --navy: #0d2c54;
    --navy-light: #1a4a8a;
    --bg: #f4f6fa;
    --card-bg: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --green: #0e9f6e;
    --amber: #b45309;
    --amber-bg: #fef3c7;
    --border: #e5e7eb;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(13,44,84,.08), 0 4px 14px rgba(13,44,84,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .logo-badge {
    background: var(--red);
    color: #fff;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: .5px;
    padding: 6px 10px;
    border-radius: 8px;
    white-space: nowrap;
  }
  header h1 { font-size: 16px; font-weight: 600; line-height: 1.3; }
  header .sub { font-size: 12px; opacity: .75; font-weight: 400; }

  .container { max-width: 760px; margin: 0 auto; padding: 18px 16px 80px; }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 14px; }
  #search {
    width: 100%;
    padding: 13px 16px 13px 42px;
    font-size: 15px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--card-bg) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%236b7280" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') 14px center no-repeat;
    outline: none;
  }
  #search:focus { border-color: var(--navy-light); }
  #search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    z-index: 30; overflow: hidden; display: none;
  }
  #search-results.open { display: block; }
  .search-item {
    display: block; width: 100%; text-align: left;
    padding: 12px 16px; border: none; background: none;
    font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border);
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: #eef2f9; }
  .search-item .path { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Breadcrumbs */
  .crumbs {
    display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
    font-size: 13px; color: var(--muted); margin-bottom: 12px; min-height: 20px;
  }
  .crumbs button {
    background: none; border: none; color: var(--navy-light);
    font-size: 13px; cursor: pointer; padding: 2px 4px; border-radius: 4px;
  }
  .crumbs button:hover { text-decoration: underline; }
  .crumbs .sep { color: #c3cad6; }
  .crumbs .current { color: var(--text); font-weight: 600; padding: 2px 4px; }

  /* Card */
  .card {
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 22px 20px;
  }
  .card h2 { font-size: 19px; color: var(--navy); margin-bottom: 6px; }
  .card .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 16px; }

  .options { display: grid; gap: 10px; margin-top: 14px; }
  .opt {
    display: flex; align-items: center; gap: 12px;
    width: 100%; text-align: left;
    padding: 15px 16px; font-size: 15px; font-weight: 500;
    background: #f8fafc; color: var(--text);
    border: 1.5px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: border-color .12s, background .12s, transform .06s;
  }
  .opt:hover { border-color: var(--navy-light); background: #eef2f9; }
  .opt:active { transform: scale(.99); }
  .opt .icon { font-size: 20px; flex-shrink: 0; }
  .opt .arrow { margin-left: auto; color: #b6bfcd; font-size: 16px; flex-shrink: 0; }

  /* Steps */
  .steps { margin: 14px 0; padding: 0; list-style: none; counter-reset: step; }
  .steps li {
    counter-increment: step;
    position: relative; padding: 8px 0 8px 40px; font-size: 15px; line-height: 1.5;
  }
  .steps li::before {
    content: counter(step);
    position: absolute; left: 0; top: 7px;
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--navy); color: #fff;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  /* Price block */
  .price-block {
    background: #f0f6ff; border: 1.5px solid #c9ddf7;
    border-radius: 12px; padding: 14px 16px; margin: 14px 0;
  }
  .price-block .label {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--navy-light); margin-bottom: 8px;
  }
  .price-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 0; font-size: 15px; border-bottom: 1px dashed #c9ddf7;
  }
  .price-row:last-child { border-bottom: none; }
  .price-row .amount { font-weight: 700; color: var(--navy); white-space: nowrap; }

  /* Message block */
  .msg-block {
    background: #f9fafb; border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin: 14px 0;
  }
  .msg-block .msg-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px; margin-bottom: 10px;
  }
  .msg-block .label {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--muted);
  }
  .msg-text { font-size: 14.5px; line-height: 1.65; white-space: pre-wrap; color: #374151; }
  .msg-text .ph { background: #fef3c7; color: var(--amber); border-radius: 4px; padding: 0 3px; font-weight: 600; }
  .copy-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--navy); color: #fff;
    border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; flex-shrink: 0; transition: background .12s;
  }
  .copy-btn:hover { background: var(--navy-light); }
  .copy-btn.copied { background: var(--green); }

  /* Escalate / note */
  .escalate-box {
    background: var(--amber-bg); border: 1.5px solid #fcd34d;
    border-radius: 12px; padding: 14px 16px; margin: 14px 0;
    font-size: 14.5px; line-height: 1.55; color: #78350f;
  }
  .escalate-box strong { color: #92400e; }
  .note {
    font-size: 13.5px; color: var(--muted); margin-top: 12px;
    padding-left: 10px; border-left: 3px solid var(--border); line-height: 1.5;
  }

  /* Nav buttons */
  .nav-row { display: flex; gap: 10px; margin-top: 18px; }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 11px 18px; font-size: 14px; font-weight: 600;
    border-radius: 10px; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text);
    transition: border-color .12s, background .12s;
  }
  .nav-btn:hover { border-color: var(--navy-light); background: #eef2f9; }
  .nav-btn.home { margin-left: auto; }

  footer {
    text-align: center; font-size: 12px; color: #9aa3b2;
    padding: 24px 16px; line-height: 1.6;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 14px; }
    .card { padding: 18px 15px; }
    .card h2 { font-size: 17px; }
  }
</style>

  <div>

<script>
/* ============================================================
   ============  EDIT HERE — CONFIG (prices & names)  =========
   ============================================================
   This is the ONLY section you normally need to touch.
   - Change any price by editing the text in quotes.
   - "AED ___" means the real price still needs to be filled in.
   - Placeholders like [Customer Name] stay in the messages;
     the front desk replaces them before sending.
============================================================ */

const CONFIG = {
  companyName: "Atlantic After-Sales UAE",
  managerName: "Sahil",                 // who to escalate to
  managerContact: "[Manager Phone / Ext]",

  prices: {
    // --- Water heater unit prices (supply only, from Quote Calculator) ---
    wh_30L:  "AED 355 (vertical)",
    wh_50L:  "AED 420 horizontal / AED 380 vertical",
    wh_80L:  "AED 460 horizontal / AED 415 vertical",
    wh_100L: "AED 550 horizontal / AED 515 vertical",

    // --- Services ---
    installation_wh:   "AED 300 per unit",  // up to 100L; larger units cost more — use the Quote Calculator
    inspection_visit:  "AED 700",           // Dubai standard call-out (1–2 days), ex VAT; other cities & flexi/save rates are in the Quote Calculator
    callout_fee:       "AED 160",           // call-out fee when a warranty claim is not covered (Step 4B / Step 5)
    amc_basic:         "AED ___",           // annual maintenance – 1 visit/year
    amc_premium:       "AED ___",           // annual maintenance – 2 visits/year
  },

  warranty: {
    parts_years: "2",   // warranty on parts (years)
    tank_years:  "5",   // warranty on inner tank (years)
  },
};

/* ============================================================
   ==================  CARDS (the flow)  ======================
   ============================================================
   Each card is either:
   - a MENU card:  { title, subtitle, options: [{icon, label, goto}] }
   - an ACTION card: { title, steps: [...], prices: [...], message: "...", note, escalate }
   Prices inside messages/prices use {{price:key}} which pulls
   from CONFIG.prices above — so you only edit prices in one place.
   Messages support [Placeholders] which the front desk fills in.
============================================================ */

const CARDS = {

  home: {
    title: "What does the customer need?",
    subtitle: "Click the option that matches the call / walk-in / message.",
    crumb: "Home",
    options: [
      { icon: "💧", label: "New enquiry — price quote",        goto: "enquiry" },
      { icon: "🔧", label: "Repair request (unit has a problem)", goto: "repair" },
      { icon: "🛡️", label: "Warranty claim",                   goto: "warranty" },
      { icon: "🚿", label: "Installation request",             goto: "installation" },
      { icon: "🗓️", label: "Annual maintenance (AMC)",         goto: "amc" },
      { icon: "⚙️", label: "Spare parts",                      goto: "spares" },
      { icon: "😟", label: "Complaint / unhappy customer",     goto: "complaint" },
      { icon: "❓", label: "Not sure / anything else",         goto: "escalate_general" },
    ],
  },

  /* ---------------- NEW ENQUIRY ---------------- */

  enquiry: {
    title: "New enquiry — which product?",
    crumb: "New Enquiry",
    keywords: "quote quotation price cost buy new unit",
    options: [
      { icon: "🚿", label: "Water heater",            goto: "enquiry_wh" },
      { icon: "♨️", label: "Heat pump",               goto: "enquiry_hp" },
      { icon: "❓", label: "Customer isn't sure what they need", goto: "enquiry_unsure" },
    ],
  },

  enquiry_wh: {
    title: "Water heater — price quote",
    crumb: "Water Heater Quote",
    keywords: "water heater price 30 50 80 100 litre liter capacity quote",
    steps: [
      "Ask the customer which capacity they need (30L / 50L / 80L / 100L). If they don't know: 1–2 people → 30–50L, family of 3–4 → 80L, larger → 100L.",
      "Quote the matching price from the table below.",
      "Copy the message, fill in the [placeholders], and send it.",
    ],
    prices: [
      { label: "30L water heater",  value: "{{price:wh_30L}}" },
      { label: "50L water heater",  value: "{{price:wh_50L}}" },
      { label: "80L water heater",  value: "{{price:wh_80L}}" },
      { label: "100L water heater", value: "{{price:wh_100L}}" },
      { label: "150L – 500L", value: "Use the Quote Calculator" },
    ],
    message:
`Dear [Customer Name],

Thank you for contacting Atlantic After-Sales UAE! 😊

The price for the [Capacity] Atlantic water heater is [Price] (supply only). Installation is available at {{price:installation_wh}} if needed.

Would you like to go ahead? I'd be happy to arrange it for you.

Best regards,
[Your Name]
Atlantic After-Sales UAE`,
    note: "Ask if they want it horizontal or vertical — prices differ. For 150L–500L units, larger installations, or a formal PDF quotation, open the Quote Calculator from the Home page. If still unsure, check with the manager before quoting.",
  },

  enquiry_hp: {
    title: "Heat pump — enquiry",
    crumb: "Heat Pump Quote",
    keywords: "heat pump quote price villa pool",
    escalate: "Heat pump quotes are custom — <strong>do not quote a price yourself.</strong> Collect the details below and pass them to the manager.",
    steps: [
      "Ask: is it for a villa, apartment, or swimming pool?",
      "Ask the approximate hot water usage (number of bathrooms / people, or pool size).",
      "Ask for their name, phone number, and location (emirate + area).",
      "Send the holding message below, then forward all details to the manager.",
    ],
    message:
`Dear [Customer Name],

Thank you for your interest in Atlantic heat pumps! 😊

Heat pump systems are sized to each property, so our technical team will prepare a customised quote for you. I've shared your details with them and you'll hear from us within [Timeframe].

Best regards,
[Your Name]
Atlantic After-Sales UAE`,
  },

  enquiry_unsure: {
    title: "Customer isn't sure what they need",
    crumb: "Unsure Customer",
    keywords: "not sure recommend which product advice",
    steps: [
      "Ask what they want the hot water for: bathroom/kitchen → water heater; whole villa or pool → heat pump.",
      "If it's a simple water heater need, go back and use the Water Heater quote card.",
      "If it sounds like a bigger system or you're unsure, send the message below and pass details to the manager.",
    ],
    message:
`Dear [Customer Name],

Thank you for reaching out to Atlantic After-Sales UAE! 😊

To recommend the right product, our team will give you a quick call to understand your requirement. Could you please share a good time to reach you?

Best regards,
[Your Name]
Atlantic After-Sales UAE`,
  },

  /* ---------------- REPAIR ---------------- */

  repair: {
    title: "Repair request — is the unit under warranty?",
    subtitle: "Warranty: " + "{{w:parts_years}} years on parts, {{w:tank_years}} years on the inner tank, from purchase date.",
    crumb: "Repair",
    keywords: "repair broken not working leaking no hot water fix problem fault",
    options: [
      { icon: "✅", label: "Yes — under warranty",      goto: "repair_warranty" },
      { icon: "❌", label: "No — out of warranty",      goto: "repair_paid" },
      { icon: "🤔", label: "Not sure — need to check",  goto: "repair_check" },
    ],
  },

  repair_check: {
    title: "How to check warranty status",
    crumb: "Check Warranty",
    keywords: "check warranty status invoice purchase date serial number",
    steps: [
      "Ask the customer for their purchase invoice (photo is fine) or the purchase date.",
      "Ask for the serial number — it's on the sticker on the unit (photo is fine).",
      "Parts warranty = {{w:parts_years}} years from purchase date. Inner tank = {{w:tank_years}} years.",
      "If today is within those periods → treat as UNDER warranty. Otherwise → out of warranty.",
    ],
    message:
`Dear [Customer Name],

I'm sorry to hear about the issue — we'll get this sorted for you! 😊

To check your warranty, could you please send:
1. A photo of your purchase invoice (or the purchase date)
2. A photo of the sticker on the unit (with the serial number)

Once I have these, I'll confirm the next steps right away.

Best regards,
[Your Name]
Atlantic After-Sales UAE`,
    note: "Once you know the status, use the Back button and pick 'under warranty' or 'out of warranty'. If the documents are unclear or the dates are borderline, check with the manager.",
    options: [
      { icon: "✅", label: "Checked — it IS under warranty",  goto: "repair_warranty" },
      { icon: "❌", label: "Checked — it's OUT of warranty",  goto: "repair_paid" },
    ],
  },

  repair_warranty: {
    title: "Warranty repair — book a technician",
    crumb: "Warranty Repair",
    keywords: "warranty repair free technician visit booking",
    steps: [
      "Confirm you have: invoice/purchase date, serial number, and a short description of the problem.",
      "Ask for the full address (emirate, area, building/villa) and preferred visit day.",
      "Send the confirmation message below.",
      "Log the booking and inform the service team / manager so a technician is assigned.",
    ],
    message:
`Dear [Customer Name],

Good news — your unit is covered under warranty, so the repair visit is free of charge for manufacturing faults. 😊

I've booked a technician visit for [Date / Time Window] at [Address]. Our technician will diagnose the issue and repair it on the spot wherever possible.

If you need to reschedule, just let me know!

Best regards,
[Your Name]
Atlantic After-Sales UAE`,
    note: "If the damage looks caused by misuse, wrong installation, or water quality (not a manufacturing fault), don't promise a free repair — tell the customer the technician will confirm coverage on-site, and flag it to the manager.",
  },

  repair_paid: {
    title: "Paid repair — out of warranty",
    crumb: "Paid Repair",
    keywords: "paid repair out of warranty inspection fee call out charge",
    steps: [
      "Explain there is an inspection / call-out fee, and repair costs are quoted after diagnosis.",
      "Ask which city the customer is in. The fee below is for Dubai (standard, 1–2 days). For any other city, or flexi/save visit options, get the exact fee from the Quote Calculator → Repair.",
      "If they agree, take their address and preferred visit day, then send the message.",
    ],

/* ============================================================
   =============  APP LOGIC (no need to edit below)  ==========
============================================================ */

const $card = document.getElementById("card");
const $crumbs = document.getElementById("crumbs");
const $search = document.getElementById("search");
const $results = document.getElementById("search-results");

let history = ["home"];

function fill(text) {
  if (!text) return text;
  return text
    .replace(/\{\{price:(\w+)\}\}/g, (_, k) => CONFIG.prices[k] ?? "AED ___")
    .replace(/\{\{w:(\w+)\}\}/g, (_, k) => CONFIG.warranty[k] ?? "___")
    .replace(/\{\{managerName\}\}/g, CONFIG.managerName)
    .replace(/\{\{managerContact\}\}/g, CONFIG.managerContact);
}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// Highlight [placeholders] in displayed messages
function renderMsgHTML(text) {
  return esc(text).replace(/\[([^\]\n]+)\]/g, '<span class="ph">[$1]</span>');
}

function crumbLabel(id) {
  const c = CARDS[id];
  return c.crumb || c.title;
}

function render(id) {
  const c = CARDS[id];
  if (!c) return;

  // breadcrumbs
  $crumbs.innerHTML = "";
  history.forEach((hid, i) => {
    if (i < history.length - 1) {
      const b = document.createElement("button");
      b.textContent = crumbLabel(hid);
      b.onclick = () => { history = history.slice(0, i + 1); render(hid); };
      $crumbs.appendChild(b);
      const sep = document.createElement("span");
      sep.className = "sep";
      sep.textContent = "›";
      $crumbs.appendChild(sep);
    } else {
      const cur = document.createElement("span");
      cur.className = "current";
      cur.textContent = crumbLabel(hid);
      $crumbs.appendChild(cur);
    }
  });

  let html = `<div class="card"><h2>${esc(fill(c.title))}</h2>`;
  if (c.subtitle) html += `<p class="subtitle">${esc(fill(c.subtitle))}</p>`;

  if (c.escalate) {
    html += `<div class="escalate-box">⚠️ ${fill(c.escalate)}</div>`;
  }

  if (c.steps) {
    html += `<ol class="steps">` + c.steps.map(s => `<li>${esc(fill(s))}</li>`).join("") + `</ol>`;
  }

  if (c.prices) {
    html += `<div class="price-block"><div class="label">💰 Price to quote</div>`;
    html += c.prices.map(p =>
      `<div class="price-row"><span>${esc(fill(p.label))}</span><span class="amount">${esc(fill(p.value))}</span></div>`
    ).join("");
    html += `</div>`;
  }

  if (c.message) {
    const filled = fill(c.message);
    html += `<div class="msg-block">
      <div class="msg-head">
        <span class="label">✉️ Message to send — replace the <span style="background:#fef3c7;color:#b45309;border-radius:4px;padding:0 3px;">[highlighted]</span> parts</span>
        <button class="copy-btn" data-copy>📋 Copy message</button>
      </div>
      <div class="msg-text">${renderMsgHTML(filled)}</div>
    </div>`;
  }

  if (c.options) {
    html += `<div class="options">` + c.options.map((o, i) =>
      `<button class="opt" data-goto="${o.goto}"><span class="icon">${o.icon || "▪️"}</span>${esc(o.label)}<span class="arrow">›</span></button>`
    ).join("") + `</div>`;
  }

  if (c.note) html += `<p class="note">💡 ${esc(fill(c.note))}</p>`;

  // nav buttons (hidden on home)
  if (id !== "home") {
    html += `<div class="nav-row">
      <button class="nav-btn" data-back>← Back</button>
      <button class="nav-btn home" data-home>🏠 Start over</button>
    </div>`;
  }

  html += `</div>`;
  $card.innerHTML = html;
  window.scrollTo({ top: 0 });

  // wire up
  $card.querySelectorAll("[data-goto]").forEach(btn => {
    btn.onclick = () => { history.push(btn.dataset.goto); render(btn.dataset.goto); };
  });
  const back = $card.querySelector("[data-back]");
  if (back) back.onclick = () => {
    if (history.length > 1) { history.pop(); render(history[history.length - 1]); }
  };
  const home = $card.querySelector("[data-home]");
  if (home) home.onclick = () => { history = ["home"]; render("home"); };

  const copyBtn = $card.querySelector("[data-copy]");
  if (copyBtn) copyBtn.onclick = async () => {
    const text = fill(c.message);
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }
    copyBtn.textContent = "✅ Copied!";
    copyBtn.classList.add("copied");
    setTimeout(() => {
      copyBtn.innerHTML = "📋 Copy message";
      copyBtn.classList.remove("copied");
    }, 1800);
  };
}

/* ---------- Search ---------- */

// Build a path from home to each card for search context
function pathTo(target) {
  const visited = new Set();
  function dfs(id, trail) {
    if (visited.has(id)) return null;
    visited.add(id);
    const t = [...trail, id];
    if (id === target) return t;
    const c = CARDS[id];
    if (c && c.options) {
      for (const o of c.options) {
        const r = dfs(o.goto, t);
        if (r) return r;
      }
    }
    return null;
  }
  return dfs("home", []) || [target];
}

const SEARCH_INDEX = Object.entries(CARDS).filter(([id]) => id !== "home").map(([id, c]) => ({
  id,
  title: fill(c.title),
  haystack: [
    c.title, c.crumb, c.keywords, c.subtitle,
    (c.options || []).map(o => o.label).join(" "),
    c.message, (c.steps || []).join(" "),
  ].filter(Boolean).join(" ").toLowerCase(),
}));

$search.addEventListener("input", () => {
  const q = $search.value.trim().toLowerCase();
  if (q.length < 2) { $results.classList.remove("open"); return; }
  const terms = q.split(/\s+/);
  const hits = SEARCH_INDEX.filter(e => terms.every(t => e.haystack.includes(t))).slice(0, 7);
  if (!hits.length) {
    $results.innerHTML = `<div class="search-item" style="cursor:default;color:var(--muted)">No match — try another word, or ask the manager.</div>`;
    $results.classList.add("open");
    return;
  }
  $results.innerHTML = hits.map(h => {
    const path = pathTo(h.id).map(crumbLabel).join(" › ");
    return `<button class="search-item" data-id="${h.id}">${esc(h.title)}<span class="path">${esc(path)}</span></button>`;
  }).join("");
  $results.classList.add("open");
  $results.querySelectorAll("[data-id]").forEach(btn => {
    btn.onclick = () => {
      history = pathTo(btn.dataset.id);
      render(btn.dataset.id);
      $search.value = "";
      $results.classList.remove("open");
    };
  });
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-wrap")) $results.classList.remove("open");
});

render("home");
</script>

function populateSelect(sel, items, textFn) {
  sel.innerHTML = "";
  items.forEach((item, i) => {
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = textFn(item);
    sel.appendChild(opt);

}

/* ===== Spare-part row rendering ===== */
function renderSpareRows(container, parts, qtyMap, mount) {
  container.innerHTML = "";
  let lastGroup = null;
  parts.forEach((p, i) => {
    if (mount && !fitsMount(p, mount)) return;
    if (p.group && p.group !== lastGroup) {
      const h = document.createElement("div");
      h.className = "spare-group-title";
      h.textContent = p.group;
      container.appendChild(h);
      lastGroup = p.group;
    }
    const qty = qtyMap[i] || 0;
    const priceTxt = (p.price == null) ? "Price on request" : fmt(p.price) + " ex VAT";
    const codeHtml = p.code ? `<span class="code">${p.code}</span>` : `<span class="code muted">no code</span>`;
    const lineTxt = (qty > 0 && p.price != null) ? "× " + qty + " = " + fmt(p.price * qty) : "";

    const row = document.createElement("div");
    row.className = "spare-row" + (qty > 0 ? " selected" : "");
    row.innerHTML =
      `<div class="spare-info">` +
        `<div class="spare-name">${p.label}</div>` +
        `<div class="spare-sub">${codeHtml}<span class="dot">·</span><span class="price">${priceTxt}</span></div>` +
        `<div class="spare-line" data-line>${lineTxt}</div>` +
      `</div>` +
      `<div class="stepper">` +
        `<button type="button" class="step dec" aria-label="Decrease ${p.label}">&minus;</button>` +
        `<input type="number" class="spare-qty" min="0" step="1" value="${qty}" inputmode="numeric" aria-label="Quantity for ${p.label}">` +
        `<button type="button" class="step inc" aria-label="Increase ${p.label}">+</button>` +
      `</div>`;
    container.appendChild(row);

    const input = row.querySelector(".spare-qty");
    const lineEl = row.querySelector("[data-line]");
    const apply = (v) => {
      v = Math.max(0, v | 0);
      qtyMap[i] = v;
      if (String(v) !== input.value) input.value = v;
      row.classList.toggle("selected", v > 0);
      lineEl.textContent = (v > 0 && p.price != null) ? "× " + v + " = " + fmt(p.price * v) : "";
      recalc();
    };
    row.querySelector(".dec").addEventListener("click", () => apply((qtyMap[i] || 0) - 1));
    row.querySelector(".inc").addEventListener("click", () => apply((qtyMap[i] || 0) + 1));
    input.addEventListener("input", () => apply(parseInt(input.value, 10) || 0));
  });
}
function buildSpareList()    { renderSpareRows(el.spareList, PRICING.heaterSpareParts, heaterSpareQty, getSpareMount()); }
function buildHeatPumpList() {
  const key = getHeatPumpRange();

  if (!range.parts.length) { el.heatPumpList.innerHTML = `<div class="empty-note">${range.label} parts list coming soon.</div>`; return; }
  renderSpareRows(el.heatPumpList, range.parts, heatPumpSpareQty[key], null);
}

  const q = (sel) => el.unitDetails.querySelectorAll(sel);
  q(".unit-size-sel").forEach((s) => s.addEventListener("change", (e) => { unitStates[+e.target.dataset.unit].sizeIdx = +e.target.value; buildUnitDetails(); recalc(); }));
  q(".u-ceil-chk").forEach((c) => c.addEventListener("change", (e) => { const i = +e.target.dataset.unit; unitStates[i].ceilingNeeded = e.target.checked; e.target.closest(".unit-card").querySelector(".u-ceil-block").hidden = !e.target.checked; recalc(); }));
  q(".u-ceil-sel").forEach((s) => s.addEventListener("change", (e) => { unitStates[+e.target.dataset.unit].ceilingIdx = +e.target.value; recalc(); }));
  q(".u-conn-sel").forEach((s) => s.addEventListener("change", (e) => { unitStates[+e.target.dataset.unit].connectors = e.target.value; recalc(); }));
  q(".u-isol-sel").forEach((s) => s.addEventListener("change", (e) => { unitStates[+e.target.dataset.unit].isolValveIdx = +e.target.value; recalc(); }));
  q(".u-angle-sel").forEach((s) => s.addEventListener("change", (e) => { unitStates[+e.target.dataset.unit].angleValveIdx = +e.target.value; recalc(); }));
  q(".u-pipe-chk").forEach((c) => c.addEventListener("change", (e) => { const i = +e.target.dataset.unit; unitStates[i].piping = e.target.checked; e.target.closest(".unit-card").querySelector(".u-pipe-block").hidden = !e.target.checked; recalc(); }));
  q(".u-pipe-size-sel").forEach((s) => s.addEventListener("change", (e) => { unitStates[+e.target.dataset.unit].pipeSizeIdx = +e.target.value; recalc(); }));
  q(".u-pipe-len").forEach((inp) => {
    const update = (e) => { const i = +e.target.dataset.unit; const v = Math.max(1, parseInt(e.target.value, 10) || 1); unitStates[i].pipeMeters = v; if (e.type === "blur") e.target.value = v; recalc(); };
    inp.addEventListener("input", update); inp.addEventListener("blur", update);
  });
}

/* ===== Pricing helpers ===== */
function calcPipingCost(pipeSizeIdx, meters) {
  const ps = PRICING.pipeSizes[pipeSizeIdx] || PRICING.pipeSizes[0];
  const extraMeters = Math.max(0, meters - PRICING.piping.laborFreeMeters);
  return meters * ps.pricePerMeter + Math.ceil(extraMeters / 2) * PRICING.piping.laborPer2Meters;
}
function calcCallOutExVat() {
  const loc = PRICING.locations[Number(el.location.value)] || PRICING.locations[0];
  const type = getCallOut();
  if (type === "standard") return loc.callOutStdExVAT;
  if (type === "flexi")    return loc.callOutStdExVAT * 0.5;
  return 160;
}
function callOutLabel() {
  const type = getCallOut();
  if (type === "standard") return "Standard Call Out (1–2 days)";
  if (type === "flexi")    return "Flexi Call Out (3–5 days)";
  return "Save Call Out (5–7 days)";
}
function lineHTML(desc, sub, amount) {
  const small = sub ? `<small>${sub}</small>` : "";
  return `<div class="line"><span class="desc">${desc}${small}</span><span class="amt">${fmt(amount)}</span></div>`;
}
function spareLines(parts, qtyMap, mount, tag) {
  tag = tag || "";
  let html = "", subtotal = 0;
  parts.forEach((p, i) => {
    const qty = qtyMap[i] || 0;
    if (qty <= 0) return;
    if (mount && !fitsMount(p, mount)) return;
    const price = p.price || 0;
    const amount = price * qty;
    subtotal += amount;
    const codeTxt = (p.code ? "Code " + p.code : "") + (p.price == null ? (p.code ? " · price TBD" : "price TBD") : "");
    html += lineHTML(p.label + " × " + qty + tag, codeTxt, amount);
  });
  return { html, subtotal };
}

/* ===== Core recalc ===== */
function recalc() {
  let html = "", subtotal = 0, withVat = false;

  if (isHeatPump()) {
    withVat = true;
    const key = getHeatPumpRange();
    const r = spareLines(PRICING.heatPumpRanges[key].parts, heatPumpSpareQty[key], null, "");
    html = r.html; subtotal = r.subtotal;

  } else {
    const pathway = getPathway();

    if (pathway === "spareParts") {
      withVat = true;
      const r = spareLines(PRICING.heaterSpareParts, heaterSpareQty, getSpareMount(), "");
      html = r.html; subtotal = r.subtotal;

    } else if (pathway === "repair") {
      withVat = true;
      const loc = PRICING.locations[Number(el.location.value)] || PRICING.locations[0];
      const callOut = calcCallOutExVat();
      const type = getCallOut();
      const sub = loc.label + (type === "save" ? " · flat rate" : type === "flexi" ? " · 50% of standard" : "");
      html += lineHTML(callOutLabel(), sub, callOut);
      subtotal += callOut;
      const qty = getRepairQty();
      syncRepairUnitStates(qty);
      for (let i = 0; i < qty; i++) {
        const u = repairUnitStates[i];
        const tag = qty > 1 ? ` (Unit ${i + 1})` : "";
        html += lineHTML("Repair Labour" + tag, "ex VAT", PRICING.repair.laborExVAT);
        subtotal += PRICING.repair.laborExVAT;
        const r = spareLines(PRICING.heaterSpareParts, u.partQty, u.mount, tag);
        html += r.html; subtotal += r.subtotal;
      }

    } else {
      withVat = false;
      const sizes = currentSizes();
      const qty = getQty();
      const pathwayObj = PRICING.pathways[pathway];
      const orientLabel = getOrientation() === "vertical" ? "Vertical" : "Horizontal";
      syncUnitStates(qty);

      const allSame = qty === 0 || unitStates.slice(0, qty).every((u) => u.sizeIdx === unitStates[0].sizeIdx);
      let heaterTotal = 0, installTotal = 0;
      unitStates.slice(0, qty).forEach((u) => { const s = sizes[u.sizeIdx] || sizes[0]; heaterTotal += (s.price || 0); installTotal += s.installPerUnit; });

      if (allSame && qty > 0) {
        const s = sizes[unitStates[0].sizeIdx] || sizes[0];
        const tbd = (s.price == null) ? " · price TBD" : "";
        html += lineHTML("Water Heater", `${PRICING.brand} ${s.label} · ${orientLabel} × ${qty}${tbd}`, heaterTotal);
        html += lineHTML("Installation", `${qty} unit${qty > 1 ? "s" : ""} @ ${fmt(s.installPerUnit)}`, installTotal);
      } else {
        for (let i = 0; i < qty; i++) {
          const s = sizes[unitStates[i].sizeIdx] || sizes[0];
          const tbd = (s.price == null) ? " · price TBD" : "";
          html += lineHTML(`Water Heater (Unit ${i + 1})`, `${PRICING.brand} ${s.label} · ${orientLabel}${tbd}`, (s.price || 0));
          html += lineHTML(`Installation (Unit ${i + 1})`, fmt(s.installPerUnit) + " / unit", s.installPerUnit);
        }
      }

      const anchoringTotal = pathwayObj.anchoring * qty;
      if (anchoringTotal > 0) html += lineHTML("Anchoring", `${pathwayObj.label}${qty > 1 ? " × " + qty : ""}`, anchoringTotal);
      subtotal = heaterTotal + installTotal + anchoringTotal;

      for (let i = 0; i < qty; i++) {
        const u = unitStates[i];
        const size = sizes[u.sizeIdx] || sizes[0];
        const valvesOk = size.litres >= PRICING.valvesMinLitres;
        const tag = qty > 1 ? ` (Unit ${i + 1})` : "";
        if (u.ceilingNeeded) { const c = PRICING.falseCeiling[u.ceilingIdx] || PRICING.falseCeiling[0]; html += lineHTML("False Ceiling" + tag, c.label + " cm", c.price); subtotal += c.price; }
        if (u.connectors === "yes") { html += lineHTML("Flexible Connectors" + tag, "", PRICING.flexibleConnectorsPrice); subtotal += PRICING.flexibleConnectorsPrice; }
        if (valvesOk) {
          const iv = PRICING.isolationValves[u.isolValveIdx] || PRICING.isolationValves[0];
          const av = PRICING.angleValves[u.angleValveIdx] || PRICING.angleValves[0];
          if (iv.price > 0) { html += lineHTML("Isolation Valve" + tag, iv.label, iv.price); subtotal += iv.price; }
          if (av.price > 0) { html += lineHTML("Angle Valve" + tag, av.label, av.price); subtotal += av.price; }
        }
        if (u.piping) { const meters = Math.max(1, u.pipeMeters || 1); const ps = PRICING.pipeSizes[u.pipeSizeIdx] || PRICING.pipeSizes[0]; const cost = calcPipingCost(u.pipeSizeIdx, meters); html += lineHTML("Piping" + tag, `${ps.label} · ${meters} m`, cost); subtotal += cost; }
      }
    }
  }

  if (!html) html = `<div class="empty-note">No items selected yet.</div>`;
  el.breakdown.innerHTML = html;

  let grand;
  if (withVat) {
    const vat = subtotal * VAT;
    el.totalsBlock.innerHTML =
      `<div class="line"><span class="desc">Subtotal (ex VAT)</span><span class="amt">${fmt(subtotal)}</span></div>` +
      `<div class="line subtotal"><span class="desc">VAT (5%)</span><span class="amt">${fmt(vat)}</span></div>`;
    grand = subtotal + vat;
  } else {
    el.totalsBlock.innerHTML = `<div class="line subtotal"><span class="desc">Subtotal</span><span class="amt">${fmt(subtotal)}</span></div>`;
    grand = subtotal;
  }
  el.grandTotal.textContent = fmt(grand);
}

/* ===== Global change triggers ===== */
function onGlobalInstallChange() { buildUnitDetails(); recalc(); }
function onGlobalSizeChange() { const idx = Number(el.size.value) || 0; unitStates.forEach((u) => { u.sizeIdx = idx; }); buildUnitDetails(); recalc(); }
function onRepairQtyChange() { buildRepairUnitDetails(); recalc(); }
function onOrientationChange() { populateSelect(el.size, currentSizes(), (s) => s.label); el.size.value = "0"; unitStates.forEach((u) => { u.sizeIdx = 0; }); buildUnitDetails(); recalc(); }

function rebuildActiveSection() {
  applyVisibility();
  if (isHeatPump()) { buildHeatPumpList(); }
  else {
    const p = getPathway();
    if (p === "repair") buildRepairUnitDetails();
    else if (p === "spareParts") buildSpareList();
    else buildUnitDetails();
  }
  recalc();
}
function onProductChange()     { rebuildActiveSection(); }
function onPathwayChange()     { rebuildActiveSection(); }
function onSpareMountChange()  { buildSpareList(); recalc(); }

["change", "input"].forEach((evt) => {
  el.size.addEventListener(evt, onGlobalSizeChange);
  el.qty.addEventListener(evt, onGlobalInstallChange);
  el.location.addEventListener(evt, recalc);
  el.repairQty.addEventListener(evt, onRepairQtyChange);
});
el.qty.addEventListener("blur", () => { el.qty.value = getQty(); onGlobalInstallChange(); });
el.repairQty.addEventListener("blur", () => { el.repairQty.value = getRepairQty(); onRepairQtyChange(); });

document.querySelectorAll('input[name="product"]').forEach((r) => r.addEventListener("change", onProductChange));
document.querySelectorAll('input[name="pathway"]').forEach((r) => r.addEventListener("change", onPathwayChange));
document.querySelectorAll('input[name="orientation"]').forEach((r) => r.addEventListener("change", onOrientationChange));
document.querySelectorAll('input[name="callOut"]').forEach((r) => r.addEventListener("change", recalc));
document.querySelectorAll('input[name="spareMount"]').forEach((r) => r.addEventListener("change", onSpareMountChange));
document.querySelectorAll('input[name="hpRange"]').forEach((r) => r.addEventListener("change", () => { buildHeatPumpList(); recalc(); }));

/* ===== Gallery ===== */
function setFrame(frameEl, url) { const img = frameEl.querySelector("img"); if (url) { img.src = url; frameEl.classList.add("filled"); } else { img.removeAttribute("src"); frameEl.classList.remove("filled"); } }
function refreshGallery() {
  const sizes = currentSizes();
  const qty = getQty();
  const orientLabel = getOrientation() === "vertical" ? "Vertical" : "Horizontal";
  const anyCeiling = unitStates.some((u) => u.ceilingNeeded);
  const anyPiping = unitStates.some((u) => u.piping);
  const size = sizes[(unitStates[0] || { sizeIdx: 0 }).sizeIdx] || sizes[0];
  setFrame(el.frameHeater, WORK_PHOTOS.heater);
  setFrame(el.frameInstall, WORK_PHOTOS.install);
  setFrame(el.frameCeiling, WORK_PHOTOS.falseCeiling);
  setFrame(el.framePipes, WORK_PHOTOS.pipes);
  el.capHeater.innerHTML = `${PRICING.brand} ${size.label}<small>${orientLabel} · Qty ${qty}</small>`;
  el.capInstall.innerHTML = `Installation<small>${(PRICING.pathways[getPathway()] || {}).label || "—"}</small>`;
  el.capCeiling.innerHTML = `False Ceiling<small>${anyCeiling ? "Selected" : "Not in this quote"}</small>`;
  el.capPipes.innerHTML = `Piping<small>${anyPiping ? "Selected" : "Not in this quote"}</small>`;
}
let lastFocused = null;
function openGallery()  { lastFocused = document.activeElement; refreshGallery(); el.gallery.classList.add("open"); el.gallery.setAttribute("aria-hidden", "false"); document.body.style.overflow = "hidden"; el.galleryClose.focus(); }
function closeGallery() { el.gallery.classList.remove("open"); el.gallery.setAttribute("aria-hidden", "true"); document.body.style.overflow = ""; if (lastFocused && lastFocused.focus) lastFocused.focus(); }
el.galleryOpen.addEventListener("click", openGallery);
el.galleryClose.addEventListener("click", closeGallery);
el.gallery.addEventListener("click", (e) => { if (e.target.hasAttribute("data-close")) closeGallery(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && el.gallery.classList.contains("open")) closeGallery(); });

/* ===== Disclaimer ===== */
const DISCLAIMER_MIN_LITRES = 200;
function largestUnitLitres() { const sizes = currentSizes(); return unitStates.reduce((m, u) => Math.max(m, (sizes[u.sizeIdx] || sizes[0]).litres), 0); }
function largestUnitLabel()  { const sizes = currentSizes(); let best = sizes[0]; unitStates.forEach((u) => { const s = sizes[u.sizeIdx] || sizes[0]; if (s.litres > best.litres) best = s; }); return best.label; }
function openDisclaimer() {
  el.disclaimerText.textContent = "If the " + largestUnitLabel() + " unit needs to be lifted to an upper level, we want to make you aware that this carries some physical risk during the lifting process. Our team will take all reasonable precautions. However, by confirming this message, you acknowledge that CTT shall not be held liable for any accidental damage to the unit or surrounding property during the lifting operation, and that any replacement unit, if required, will be chargeable separately.";
  el.disclaimerModal.classList.add("open"); el.disclaimerModal.setAttribute("aria-hidden", "false"); document.body.style.overflow = "hidden"; el.disclaimerAck.focus();
}
function closeDisclaimer() { el.disclaimerModal.classList.remove("open"); el.disclaimerModal.setAttribute("aria-hidden", "true"); document.body.style.overflow = ""; el.confirm.focus(); }
el.disclaimerAck.addEventListener("click", closeDisclaimer);
el.disclaimerModal.addEventListener("click", (e) => { if (e.target.hasAttribute("data-close-disclaimer")) closeDisclaimer(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && el.disclaimerModal.classList.contains("open")) closeDisclaimer(); });
el.confirm.addEventListener("click", () => {
  const p = getPathway();
  if (!isHeatPump() && (p === "reinstallation" || p === "newInstallation") && largestUnitLitres() >= DISCLAIMER_MIN_LITRES) openDisclaimer();
});

/* =========================================================
   PRINT HELPERS
   ========================================================= */

/* Flatten a .desc element: "Main Text — Sub Text" */
function getLineDescText(descEl) {
  if (!descEl) return "";
  const clone = descEl.cloneNode(true);
  const small = clone.querySelector("small");
  if (small) {
    const subText = small.textContent.trim();
    small.remove();
    const mainText = clone.textContent.trim();
    return subText ? mainText + " — " + subText : mainText;
  }
  return clone.textContent.trim();
}

/* Auto-generate subject from current state */
function getAutoSubject() {
  const loc = PRICING.locations[Number(el.location.value)] || PRICING.locations[0];
  if (isHeatPump()) {
    const range = PRICING.heatPumpRanges[getHeatPumpRange()];
    return "Air to Water Heat Pump (" + range.label + ") — Spare Parts Supply";
  }
  const p = getPathway();
  const city = loc.label;
  if (p === "reinstallation")  return "Atlantic Water Heater Reinstallation Works — " + city;
  if (p === "newInstallation") return "Atlantic Water Heater New Installation Works — " + city;
  if (p === "repair")          return "Water Heater Repair & Call-Out Service — " + city;
  if (p === "spareParts")      return "Atlantic Water Heater Spare Parts Supply";
  return "Water Heater Works";
}

/* Auto-generate scope text */
function getScopeText() {
  const loc = PRICING.locations[Number(el.location.value)] || PRICING.locations[0];
  if (isHeatPump()) {
    const range = PRICING.heatPumpRanges[getHeatPumpRange()];
    return "Supply of genuine Atlantic spare parts for " + range.label + " range Air to Water Heat Pump units as per Annexure  #1.";
  }
  const p = getPathway();
  if (p === "reinstallation")  return "Removal of existing water heater(s) and supply & installation of new Atlantic brand water heater(s) at " + loc.label + ". Unit details and quantities as per Annexure #1.";
  if (p === "newInstallation") return "Supply & installation of new Atlantic brand water heater(s) at new site — " + loc.label + ". Unit details and quantities as per Annexure #1.";
  if (p === "repair")          return "Call-out, inspection, diagnosis, repair labour and supply of spare parts for water heater unit(s) at " + loc.label + ". Details as per Annexure #1.";
  if (p === "spareParts")      return "Supply of genuine Atlantic brand spare parts for water heater units. Items and quantities as per Annexure #1.";
  return "Water heater works as detailed in Annexure #1.";
}

/* Single master exclusion list — verbatim from Cheqpoint reference quotation */
function getExclusionsList() {
  return EXCLUSIONS_MASTER;
}

/* Build price table rows from live DOM breakdown */
function buildAnnexureRows() {
  const breakdownLines = document.querySelectorAll("#breakdown .line");
  const totalLines     = document.querySelectorAll("#totalsBlock .line");
  const withVat = isHeatPump() || getPathway() === "repair" || getPathway() === "spareParts";

  let rows = "";

  breakdownLines.forEach((line) => {
    const descText = getLineDescText(line.querySelector(".desc"));
    const amtText  = (line.querySelector(".amt") || {}).textContent || "";
    const isSub    = line.classList.contains("subtotal");
    rows += `<tr${isSub ? ' class="qp-sub"' : ""}><td>${descText}</td><td class="qp-r">${amtText}</td></tr>`;
  });

  totalLines.forEach((line) => {
    const descText = getLineDescText(line.querySelector(".desc"));
    const amtText  = (line.querySelector(".amt") || {}).textContent || "";
    const isSub    = line.classList.contains("subtotal");
    rows += `<tr${isSub ? ' class="qp-sub"' : ""}><td>${descText}</td><td class="qp-r">${amtText}</td></tr>`;
  });

  const grand = el.grandTotal.textContent;
  rows += `<tr class="qp-grand"><td>GRAND TOTAL${withVat ? " (incl. VAT 5%)" : " (excl. VAT)"}</td><td class="qp-r">${grand}</td></tr>`;

  const note = withVat
    ? "VAT at 5% is included in the Grand Total above. A tax invoice will be issued upon confirmation of order."
    : "Prices shown are exclusive of VAT. VAT at 5% will be applied on the tax invoice as per UAE law.";

  return { rows, note };
}

/* =========================================================
   PRINT BUTTON HANDLER
   ========================================================= */
el.btnPrint.addEventListener("click", () => {
  const rep     = REPS[Number(el.fromRep.value)] || REPS[0];
  const loc     = PRICING.locations[Number(el.location.value)] || PRICING.locations[0];
  const subject = el.quoteSubject.value.trim() || getAutoSubject();
  const dateStr = new Date().toLocaleDateString("en-AE", { day: "2-digit", month: "long", year: "numeric" });

  /* --- Page 1 fields --- */
  const clientStr = el.clientName.value.trim();
  const attnStr   = el.attnName.value.trim();
  document.getElementById("qpTo").textContent      = clientStr ? (attnStr ? clientStr + " (Attn: " + attnStr + ")" : clientStr) : "—";
  document.getElementById("qpFrom").textContent    = rep.name;
  document.getElementById("qpRef").textContent     = el.jobNumber.value.trim() || "—";
  document.getElementById("qpProject").textContent = el.projectName.value.trim() || "—";
  document.getElementById("qpConsultant").textContent = el.consultant.value.trim() || "N/A";
  document.getElementById("qpSubject").textContent = subject;
  document.getElementById("qpDate").textContent    = dateStr;
  document.getElementById("qpScope").textContent   = getScopeText();
  document.getElementById("qpTerms").textContent   = el.termsOfPayment.value;
  document.getElementById("qpValidity").textContent = el.quoteValidity.value;

  /* --- Signature block --- */
  const sigImg = document.getElementById("qpSigImg");
  if (SIG_IMG_SRC) {
    sigImg.src = SIG_IMG_SRC;
    sigImg.style.display = "block";
  } else {
    sigImg.src = "";
    sigImg.style.display = "none";
  }
  document.getElementById("qpSigName").textContent  = rep.name;
  document.getElementById("qpSigTitle").textContent = rep.title;
  document.getElementById("qpSigMob").textContent   = rep.mob   ? "Mob: " + rep.mob   : "";
  document.getElementById("qpSigEmail").textContent = rep.email ? "Email: " + rep.email : "";

  /* --- Exclusions --- */
  document.getElementById("qpExclTable").innerHTML = getExclusionsList()
    .map((e, i) => `<tr><td class="qp-n">${i + 1}.</td><td>${e}</td></tr>`)
    .join("");

  /* --- Additional Terms --- */
  document.getElementById("qpTermsTable").innerHTML = ADDITIONAL_TERMS
    .map((t, i) => `<tr><td class="qp-n">${i + 1}.</td><td>${t}</td></tr>`)
    .join("");

  /* --- Annexure header ref line --- */
  const annexRef = [
    el.jobNumber.value.trim() ? "Ref: " + el.jobNumber.value.trim() : null,
    loc.label,
    dateStr
  ].filter(Boolean).join("  •  ");
  document.getElementById("qpAnnexRef").textContent = annexRef;

  /* --- Price breakdown table --- */
  const { rows, note } = buildAnnexureRows();
  document.getElementById("qpPriceBody").innerHTML   = rows;
  document.getElementById("qpPriceNote").textContent = note;

  window.print();
});

/* ===== Init ===== */
rebuildActiveSection();
</script>

</template>

}
function showHome() {

  document.getElementById('hero').style.display = '';

  frame.contentDocument.open();
  frame.contentDocument.write('');

}
