<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Vyom — Board</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <div id="offline-banner" hidden>You appear to be offline</div>

  <nav class="topnav">
    <div class="brand-wrap"><a class="brand" href="vyom.html">Vyom<span>.</span></a><span class="brand-by">by VBOG</span></div>
    <div class="nav-links">
      <a href="vyom.html">Dashboard</a>
      <a href="team.html">All Tasks</a>
    </div>
    <div class="nav-right">
      <a href="settings.html">Settings</a>
    </div>
  </nav>

  <main>
    <div class="page" style="padding-bottom: 16px;">
      <div class="page-header" style="margin-bottom: 0;">
        <div>
          <h1 id="board-title">Loading…</h1>
          <div class="sub" id="board-desc"></div>
        </div>
        <div class="header-actions">
          <a href="vyom.html" class="btn btn-secondary">&larr; All projects</a>
        </div>
      </div>
      <div class="filter-bar" style="margin-top: 18px;">
        <span class="filter-icon" aria-hidden="true"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg></span>
        <select id="filter-assignee" class="filter-select" aria-label="Filter by assignee"></select>
        <select id="filter-due" class="filter-select" aria-label="Filter by due date"></select>
        <button id="filter-clear" class="btn-link" hidden>Clear filters</button>
        <span class="filter-count" id="filter-count" hidden></span>
      </div>
    </div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </main>

  <!-- Create / Edit Task modal -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal">
      <h2 id="task-modal-title">New Task</h2>
      <form id="task-form" novalidate>
        <div class="form-group">
          <label for="t-title">Title *</label>
          <input type="text" id="t-title" autocomplete="off" placeholder="What needs to be done?">
        </div>
        <div class="form-group">
          <label for="t-notes">Notes</label>
          <textarea id="t-notes" placeholder="Details, links, context… (optional)"></textarea>
        </div>
        <div class="form-group">
          <label for="t-status">Status</label>
          <select id="t-status"></select>
        </div>
        <div class="form-group">
          <label for="t-assignee">Assignee</label>
          <select id="t-assignee"></select>
        </div>
        <div class="form-group">
          <label for="t-due">Due date</label>
          <input type="date" id="t-due">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="task-delete" hidden>Delete task</button>
          <div class="right">
            <button type="button" class="btn btn-secondary" id="task-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary" id="task-save">Create Task</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js?v=4"></script>
  <script src="js/supabase.js?v=4"></script>
  <script src="js/api.js?v=4"></script>
  <script src="js/ui.js?v=4"></script>
  <script src="js/board.js?v=4"></script>
</body>
</html>
